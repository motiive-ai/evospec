# EvoSpec Change Specification — Order Service Domain
id: "order-service-domain"
title: "Order Service Core Domain"
zone: "core"
change_type: "improvement"
status: "accepted"
created_at: "2026-01-15"
updated_at: "2026-01-15"

classification:
  touches_persistence: true
  touches_auth: true
  touches_billing: true
  touches_audit: false
  touches_multi_tenancy: false
  crosses_context_boundary: false
  is_hypothesis: false
  reversibility: "difficult"
  risk_level: "high"
  rationale: "Core order management with payment integration. Affects billing and auth. Hard to reverse schema changes."

invariant_impact:
  conflicts: []
  entities_touched: []
  contexts_touched: []
  reviewed: true

bounded_context: "Orders"

ownership:
  team: "Commerce Platform"
  team_type: "stream-aligned"
  interaction_mode: "x-as-a-service"

strategic_fit:
  winning_aspiration: "Reliable, scalable order management for all channels"
  where_to_play: "All customer-facing purchase flows"
  how_to_win: "Strict invariants, idempotent operations, saga-based checkout"
  capability_strengthened: "Order lifecycle management"

invariants:
  - id: "ORD-INV-001"
    statement: "Every Order MUST have at least one LineItem before status can change from draft"
    enforcement: "api-validation"
    fitness_function: "tests/fitness/test_order_invariants.py"
  - id: "ORD-INV-002"
    statement: "Order total_amount MUST equal the sum of all LineItem subtotals"
    enforcement: "domain-logic"
    fitness_function: "tests/fitness/test_order_invariants.py"
  - id: "ORD-INV-003"
    statement: "Payment MUST be authorized before Order status changes to confirmed"
    enforcement: "state-machine"
    fitness_function: "tests/fitness/test_order_invariants.py"
  - id: "ORD-INV-004"
    statement: "A cancelled Order MUST NOT transition to any other status"
    enforcement: "state-machine"
    fitness_function: "tests/fitness/test_order_invariants.py"
  - id: "ORD-INV-005"
    statement: "LineItem quantity MUST be greater than zero"
    enforcement: "schema-validation"
    fitness_function: "tests/fitness/test_order_invariants.py"
  - id: "ORD-INV-006"
    statement: "Order MUST have a valid customer_id that references an authenticated user"
    enforcement: "api-validation"
    fitness_function: "tests/fitness/test_order_invariants.py"

fitness_functions:
  - id: "ORD-FF-001"
    name: "Order lifecycle invariant enforcement"
    type: "integration-test"
    path: "tests/fitness/test_order_invariants.py"
    dimension: "data-integrity"
  - id: "ORD-FF-002"
    name: "Order API contract tests"
    type: "contract-test"
    path: "tests/fitness/test_order_api_contract.py"
    dimension: "api-stability"

adrs: []

traceability:
  endpoints:
    - "POST /api/orders/"
    - "GET /api/orders/{orderId}"
    - "POST /api/orders/{orderId}/items"
    - "DELETE /api/orders/{orderId}/items/{itemId}"
    - "POST /api/orders/{orderId}/checkout"
    - "POST /api/orders/{orderId}/cancel"
    - "GET /api/orders/customer/{customerId}"
    - "POST /api/payments/authorize"
    - "POST /api/payments/{paymentId}/capture"
    - "POST /api/payments/{paymentId}/refund"
    - "GET /api/payments/{paymentId}"
  tables:
    - "orders"
    - "line_items"
  modules:
    - "com.acme.orders.OrderController"
    - "com.acme.orders.PaymentController"
    - "com.acme.orders.Order"
    - "com.acme.orders.LineItem"
  events: []
  migrations: []
