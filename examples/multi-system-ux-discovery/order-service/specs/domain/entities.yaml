# Domain Entity Registry — Order Service
# These entities are published to downstream repos via upstreams[].

- name: "Order"
  context: "Orders"
  table: "orders"
  aggregate_root: true
  description: "Represents a customer purchase. Aggregate root for the order lifecycle."
  fields:
    - name: "id"
      type: "UUID"
    - name: "customer_id"
      type: "String"
    - name: "status"
      type: "String"
      constraints: "draft | pending_payment | confirmed | shipped | delivered | cancelled"
    - name: "total_amount"
      type: "Decimal"
    - name: "currency"
      type: "String"
    - name: "payment_id"
      type: "String"
  relationships:
    - target: "LineItem"
      type: "one-to-many"
  invariants:
    - "ORD-INV-001"
    - "ORD-INV-002"
    - "ORD-INV-003"
    - "ORD-INV-004"
    - "ORD-INV-006"

- name: "LineItem"
  context: "Orders"
  table: "line_items"
  aggregate_root: false
  description: "A single product line within an order. Quantity and pricing are immutable after confirmation."
  fields:
    - name: "id"
      type: "UUID"
    - name: "order_id"
      type: "UUID"
    - name: "product_id"
      type: "String"
    - name: "product_name"
      type: "String"
    - name: "quantity"
      type: "Integer"
    - name: "unit_price"
      type: "Decimal"
    - name: "subtotal"
      type: "Decimal"
  relationships:
    - target: "Order"
      type: "many-to-one"
  invariants:
    - "ORD-INV-001"
    - "ORD-INV-002"
    - "ORD-INV-005"
