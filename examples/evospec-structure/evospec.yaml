# EvoSpec Project Configuration
# This is a worked example of a fully configured EvoSpec project
# for an e-commerce platform.

project:
  name: "acme-commerce"
  description: "E-commerce platform for small and medium businesses"
  version: "0.1.0"

# Where specs live relative to project root
paths:
  specs: "specs/changes"
  templates: "specs/_templates"
  adrs: "docs/adr"
  domain: "specs/domain"
  checks: "specs/checks"

# Schema validation
schema:
  version: "1.0.0"
  spec_schema: "https://evospec.dev/schemas/spec.schema.json"

# Classification defaults
classification:
  core_triggers:
    - touches_persistence
    - touches_auth
    - touches_billing
    - touches_audit
    - touches_multi_tenancy
  default_reversibility: "moderate"

# Team Topologies
teams:
  - name: "commerce-core"
    type: "stream-aligned"
    bounded_contexts: ["orders", "catalog"]
  - name: "growth"
    type: "stream-aligned"
    bounded_contexts: ["recommendations", "notifications"]
  - name: "platform"
    type: "platform"
    bounded_contexts: ["infrastructure", "observability", "identity"]

# Domain model lives in specs/domain/ (separate files for maintainability):
#   specs/domain/entities.yaml   — entity registry (Order, LineItem, Product)
#   specs/domain/contexts.yaml   — bounded contexts (orders, catalog, identity, ...)
#   specs/domain/features.yaml   — feature lifecycle (feat-001, feat-002)
#   specs/domain/glossary.md     — ubiquitous language
#   specs/domain/context-map.md  — context relationships

# Upstream dependencies
upstreams: []

# Fitness function runners
fitness_functions:
  run_command: "pytest tests/fitness/ -v"
  test_runner: "pytest"
  ci_gate: true

# Reverse engineering configuration
reverse:
  framework: "fastapi"
  source_dirs:
    - "app/api"
    - "app/models"

# Strategic context (Roger Martin — Playing to Win)
strategy:
  winning_aspiration: "Be the most reliable e-commerce platform for SMBs"
  where_to_play: "Small and medium businesses selling physical products online"
  how_to_win: "Fast, reliable order processing with personalized shopping experience"
  must_have_capabilities:
    - "Sub-second order processing"
    - "Multi-tenant data isolation"
    - "Real-time inventory tracking"
  enabling_systems:
    - "PostgreSQL with tenant isolation"
    - "FastAPI with JWT authentication"
    - "Redis for caching and rate limiting"
