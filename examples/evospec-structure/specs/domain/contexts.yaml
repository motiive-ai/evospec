# Bounded Contexts — E-Commerce Platform

- name: "orders"
  owner: "commerce-core"
  type: "core"
  description: "Order lifecycle from cart to delivery. Owns Order and LineItem entities."

- name: "catalog"
  owner: "commerce-core"
  type: "core"
  description: "Product catalog management. Owns Product entity."

- name: "identity"
