schemas:
  - name: "OrderExport"
    format: "json"
    description: "Structured JSON export of a single order with items and categories. Returned by GET /api/orders/{orderId}/export."
    version: "v1"
    structure:
      - name: "order_id"
        type: "uuid"
      - name: "customer_id"
        type: "uuid"
      - name: "status"
        type: "string (draft|confirmed|shipped|delivered|cancelled)"
      - name: "total_amount"
        type: "decimal"
      - name: "created_at"
        type: "ISO 8601 timestamp"
      - name: "items"
        type: "List<ItemExport>"
    nested:
      - name: "ItemExport"
        fields:
          - name: "item_id"
            type: "uuid"
          - name: "product_name"
            type: "string"
          - name: "category"
            type: "CategoryRef"
          - name: "quantity"
            type: "integer"
          - name: "unit_price"
            type: "decimal"
          - name: "subtotal"
            type: "decimal (quantity × unit_price)"
      - name: "CategoryRef"
        fields:
          - name: "id"
            type: "uuid"
          - name: "name"
            type: "string"
          - name: "restriction_group"
            type: "string | null"
    example: "order-response.json"
