  where_to_play: "Teams adopting EvoSpec on existing codebases with years of unspecified code history"
  how_to_win: "Automated feature cluster detection from git history + retroactive spec generation — teams get a spec baseline in minutes, not weeks"
  capability_strengthened: "Adoption friction — the #1 barrier: 'we have 500K lines of code and no specs'"

