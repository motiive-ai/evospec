# EvoSpec Change Specification
# Schema: https://evospec.dev/schemas/spec.schema.json

id: "retroactive-spec-generation-from-history"
title: "Retroactive Spec Generation from Git History (evospec capture --from-history)"
zone: "edge"  # edge | hybrid | core
change_type: "experiment"  # experiment | improvement | bugfix
status: "completed"     # draft | proposed | accepted | in-progress | completed | abandoned | superseded
created_at: "2026-03-02"
updated_at: "2026-03-02"

# --- Classification (output of `evospec classify`) ---
classification:
  touches_persistence: false
  touches_auth: false
  touches_billing: false
  touches_audit: false
  touches_multi_tenancy: false
  crosses_context_boundary: true
  is_hypothesis: true
  reversibility: "trivial"  # trivial | moderate | difficult | irreversible
  risk_level: "medium"          # low | medium | high | critical
  rationale: "Hypothesis-driven: we believe git history analysis can produce useful feature clusters and retroactive specs. The core algorithm (co-change graph + community detection) is unvalidated. Edge zone because the approach is speculative — may need multiple iterations or pivots."

