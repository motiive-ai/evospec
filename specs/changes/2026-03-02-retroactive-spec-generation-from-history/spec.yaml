    - "evospec.core.capture"
    - "evospec.core.config"
  events: []
  migrations: []

# --- Discovery (required for edge) ---
discovery:
  outcome: "Reduce time-to-first-spec for existing codebases from days to minutes"
  opportunity: "How might we help teams with existing codebases generate a spec baseline without manual effort?"
  iteration: 1
  cadence: "biweekly"
  next_checkpoint: ""

  assumptions:
    - id: "A-001"
      statement: "Git co-change graphs produce meaningful feature clusters (not just random file groupings)"
      category: "feasibility"
      risk: "high"
      status: "untested"
      test_method: "Run on 5 open-source repos with known feature boundaries, measure cluster accuracy"
      success_criteria: "≥ 60% of clusters map to recognizable features"
      result: ""
      result_date: ""
      learning: ""
      pivot_to: "Use commit message NLP clustering instead of file co-change"

    - id: "A-002"
      statement: "Commit messages contain enough semantic signal to label feature clusters"
      category: "feasibility"
      risk: "high"
      status: "untested"
      test_method: "Analyze commit message patterns across 5 repos with conventional commits vs free-form"
      success_criteria: "≥ 50% of clusters get a meaningful auto-generated label"
      result: ""
      result_date: ""
      learning: ""
      pivot_to: "Use directory structure + file naming instead of commit messages"

    - id: "A-003"
      statement: "Teams find retroactive specs valuable enough to curate them (not just generated artifacts that rot)"
      category: "desirability"
      risk: "medium"
      status: "untested"
      test_method: "Generate specs for 3 projects, interview developers about usefulness"
      success_criteria: "≥ 3/5 developers say they'd use or edit the generated specs"
      result: ""
      result_date: ""
      learning: ""
      pivot_to: "Generate only domain model baseline (entities.yaml, glossary) — skip per-feature specs"

  experiments: []

  kill_criteria: "If co-change clustering fails to produce recognizable features on 3+ repos, kill this approach and fall back to reverse-engineering-only baseline generation"
  kill_deadline: ""

  learnings: []

# --- Design Thinking (edge/hybrid) ---
design_thinking:
  current_phase: "define"
  problem_statement: "Teams adopting EvoSpec on existing codebases (500K+ lines, 2+ years of history) face weeks of manual work to create a spec baseline. This blocks adoption. We hypothesize that git history contains enough signal to auto-generate a useful starting point."
  ideas_explored: 3
  empathy_artifacts: []
  prototypes: []

