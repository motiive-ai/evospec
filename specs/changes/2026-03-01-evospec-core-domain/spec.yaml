# EvoSpec Change Specification
# Schema: https://evospec.dev/schemas/spec.schema.json

id: "evospec-core-domain"
title: "evospec-core-domain"
zone: "core"  # edge | hybrid | core
change_type: "improvement"  # experiment | improvement | bugfix
status: "draft"     # draft | proposed | accepted | in-progress | completed | abandoned | superseded
created_at: "2026-03-01"
updated_at: "2026-03-01"

# --- Classification (output of `evospec classify`) ---
classification:
  touches_persistence: true
  touches_auth: false
  touches_billing: false
  touches_audit: false
  touches_multi_tenancy: false
  crosses_context_boundary: false
  is_hypothesis: false
  reversibility: "trivial"
  risk_level: "low"
  rationale: "File-based persistence (YAML/Markdown). No auth, billing, or multi-tenancy. Fully reversible."

# --- Invariant Impact (auto-populated by `evospec classify` or MCP check_invariant_impact) ---
# Shows which existing core invariants this change may affect.
invariant_impact:
  conflicts: []
    # - invariant_id: "INV-001"
    #   spec_path: "specs/changes/2025-06-01-order-rules/"
    #   statement: "Every Order must have at least one LineItem"
    #   impact: "breaks"       # breaks | relaxes | tightens | neutral
    #   resolution: ""         # exempt | evolve | shadow | redesign
    #   notes: ""
  entities_touched: []         # List of domain entities this change affects
  contexts_touched: []         # List of bounded contexts this change crosses
  reviewed: false              # Must be true before moving to in-progress

# --- Domain (required for core, optional for hybrid) ---
bounded_context: "Spec Engine"

# --- Team Topology ---
ownership:
  team: "EvoSpec Core"
  team_type: "platform"
  interaction_mode: "x-as-a-service"

# --- Strategic Fit (Roger Martin) ---
strategic_fit:
  winning_aspiration: "Be the standard spec-driven delivery toolkit for AI-assisted development"
  where_to_play: "Teams using AI coding agents (Windsurf, Claude Code, Cursor) that need proportional governance"
  how_to_win: "Zone-based classification + executable guardrails + MCP integration that no other spec tool offers"
  capability_strengthened: "Proportional specification governance — right rigor for right risk"

# --- Invariants (required for core) ---
invariants:
  - id: "INV-001"
    statement: "Every core-zone spec MUST have at least one invariant defined"
    enforcement: "ci-check"
    fitness_function: "tests/fitness/test_spec_invariants.py"
  - id: "INV-002"
    statement: "Every core-zone spec MUST have at least one fitness function"
    enforcement: "ci-check"
    fitness_function: "tests/fitness/test_spec_invariants.py"
  - id: "INV-003"
    statement: "Every core-zone spec MUST have a domain-contract.md file"
    enforcement: "ci-check"
    fitness_function: "tests/fitness/test_spec_invariants.py"
  - id: "INV-004"
    statement: "Every edge-zone spec MUST have a discovery-spec.md file"
    enforcement: "ci-check"
    fitness_function: "tests/fitness/test_spec_invariants.py"
  - id: "INV-005"
    statement: "Every invariant MUST have an enforcement mechanism"
    enforcement: "ci-check"
    fitness_function: "tests/fitness/test_spec_invariants.py"
  - id: "INV-006"
    statement: "Classification MUST be reviewed before a spec moves to in-progress"
    enforcement: "policy"
    fitness_function: "tests/fitness/test_spec_invariants.py"
  - id: "INV-007"
    statement: "spec.yaml MUST validate against the JSON Schema"
    enforcement: "schema"
    fitness_function: "tests/fitness/test_spec_schema.py"
  - id: "INV-008"
    statement: "evospec.yaml MUST exist at the project root before any command other than init runs"
    enforcement: "ci-check"
    fitness_function: "tests/fitness/test_spec_invariants.py"

# --- Fitness Functions (required for core) ---
fitness_functions:
  - id: "FF-001"
    name: "Spec schema validation"
    type: "contract-test"
    path: "tests/fitness/test_spec_schema.py"
    dimension: "data-integrity"
  - id: "FF-002"
    name: "Core zone invariant enforcement"
    type: "integration-test"
    path: "tests/fitness/test_spec_invariants.py"
    dimension: "data-integrity"
  - id: "FF-003"
    name: "CLI smoke tests"
    type: "integration-test"
    path: "tests/test_cli.py"
    dimension: "operability"

# --- ADRs ---
adrs:
  - "docs/adr/0001-adopt-evospec.md"

# --- Traceability (can be auto-generated by `evospec reverse`) ---
traceability:
  endpoints: []
  tables: []
  modules:
    - "evospec.cli.main"
    - "evospec.core.config"
    - "evospec.core.init"
    - "evospec.core.new_spec"
    - "evospec.core.classify"
    - "evospec.core.check"
    - "evospec.core.discovery"
    - "evospec.core.features"
    - "evospec.core.adr"
    - "evospec.core.render"
    - "evospec.core.status"
    - "evospec.reverse.api"
    - "evospec.reverse.db"
    - "evospec.mcp.server"
  events: []
  migrations: []

# --- Discovery (required for edge) ---
discovery:
  outcome: ""                 # Product outcome metric this change aims to influence
  opportunity: ""             # "How Might We" framing of the customer opportunity
  iteration: 1                # Current discovery iteration (increments on pivot)
  cadence: "weekly"           # weekly | biweekly | sprint
  next_checkpoint: ""         # Date of next learning checkpoint

  # Assumptions — the riskiest things that must be true for this to work
  assumptions: []
    # - id: "A-001"
    #   statement: "Users prefer personalized recommendations over generic ones"
    #   category: "desirability"  # desirability | feasibility | viability | usability
    #   risk: "high"              # high | medium | low
    #   status: "untested"        # untested | testing | validated | invalidated | pivoted
    #   test_method: "A/B test with 200 users"
    #   success_criteria: "≥ 15% conversion rate improvement"
    #   result: ""
    #   result_date: ""
    #   learning: ""
    #   pivot_to: ""              # If invalidated, what's the new direction?

  # Experiments — concrete tests run against assumptions
  experiments: []
    # - id: "EXP-001"
    #   assumption_id: "A-001"    # Links to assumption being tested
    #   type: "prototype"         # prototype | interview | survey | A-B-test | wizard-of-oz | analytics | spike
    #   description: "Show 100 users personalized recommendations vs. generic list"
    #   started_at: ""
    #   completed_at: ""
    #   sample_size: 0
    #   result: ""                # Qualitative or quantitative result
    #   confidence: ""            # high | medium | low
    #   decision: ""              # continue | pivot | kill | promote-to-core
    #   next_experiment: ""       # ID of follow-up experiment if any

  kill_criteria: ""             # Specific, measurable criteria for when to abandon
  kill_deadline: ""             # Hard deadline for kill decision

  # Learning log — updated each iteration
  learnings: []
    # - date: "2026-03-01"
    #   iteration: 1
    #   experiment_id: "EXP-001"
    #   learning: "Users engaged with recommendations but wanted to filter by category"
    #   impact: "Pivoted from static list to filterable recommendations"
    #   spec_changed: true

# --- Design Thinking (edge/hybrid) ---
design_thinking:
  current_phase: ""          # empathize | define | ideate | prototype | test
  problem_statement: ""
  ideas_explored: 0
  empathy_artifacts: []
  prototypes: []
    # - id: "PROTO-001"
    #   type: "figma"           # figma | code-spike | paper | wizard-of-oz
    #   url: ""
    #   experiment_id: "EXP-001"  # Links to experiment that tested this prototype
    #   feedback_summary: ""

# --- Organizational Risk (Hogan) ---
organizational_risk:
  derailer_risks: []
  cultural_constraints: []
  mitigation: ""
