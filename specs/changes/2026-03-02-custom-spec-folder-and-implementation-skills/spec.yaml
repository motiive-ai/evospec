# EvoSpec Change Specification
# Schema: https://evospec.dev/schemas/spec.schema.json

id: "custom-spec-folder-and-implementation-skills"
title: "Custom Spec Folder + Implementation Skills"
zone: "core"  # edge | hybrid | core
change_type: "improvement"  # experiment | improvement | bugfix
status: "draft"     # draft | proposed | accepted | in-progress | completed | abandoned | superseded
created_at: "2026-03-02"
updated_at: "2026-03-02"

# --- Classification (output of `evospec classify`) ---
classification:
  touches_persistence: false
  touches_auth: false
  touches_billing: false
  touches_audit: false
  touches_multi_tenancy: false
  crosses_context_boundary: true
  is_hypothesis: false
  reversibility: "trivial"  # trivial | moderate | difficult | irreversible
  risk_level: "low"          # low | medium | high | critical
  rationale: "Two sub-features: (1) Configurable spec folder path so projects with existing 'specs/' directories can use a custom path (e.g., 'evospec/' or '.evospec/'). (2) User-defined implementation skills — project-specific coding rules and patterns that AI agents should follow when implementing changes. Crosses cli → domain-management → agent-integration. Trivially reversible."

# --- Invariant Impact (auto-populated by `evospec classify` or MCP check_invariant_impact) ---
# Shows which existing core invariants this change may affect.
invariant_impact:
  conflicts: []
    # - invariant_id: "INV-001"
    #   spec_path: "specs/changes/2025-06-01-order-rules/"
    #   statement: "Every Order must have at least one LineItem"
    #   impact: "breaks"       # breaks | relaxes | tightens | neutral
    #   resolution: ""         # exempt | evolve | shadow | redesign
    #   notes: ""
  entities_touched:
    - "ProjectConfig"
    - "Skill"
    - "AgentFile"
  contexts_touched:
    - "cli"
    - "domain-management"
    - "agent-integration"
  reviewed: true

# --- Domain (required for core, optional for hybrid) ---
bounded_context: "domain-management"

# --- Team Topology ---
ownership:
  team: "evospec-core"
  team_type: "platform"
  interaction_mode: "x-as-a-service"

# --- Strategic Fit (Roger Martin) ---
strategic_fit:
  winning_aspiration: "Be the standard spec-driven delivery toolkit for AI-assisted development"
  where_to_play: "(1) Projects that already have a specs/ directory for other purposes. (2) Teams with specific coding standards, patterns, and tech stack rules they want AI agents to follow."
  how_to_win: "(1) Configurable paths.specs in evospec.yaml respected by all commands. (2) specs/domain/skills.yaml defines project-specific implementation rules that are injected into generated agent files."
  capability_strengthened: "Adoption flexibility + AI code quality through project-specific implementation skills"

# --- Invariants (required for core) ---
invariants:
  - id: "CUSTOM-PATH-001"
    statement: "All CLI commands and config loading MUST respect paths.specs from evospec.yaml"
    enforcement: "test"
  - id: "CUSTOM-PATH-002"
    statement: "Default spec folder MUST remain 'specs/' for backward compatibility"
    enforcement: "test"
  - id: "SKILLS-001"
    statement: "Implementation skills MUST be included in generated agent files (CLAUDE.md, .windsurf/, .cursor/)"
    enforcement: "test"

# --- Fitness Functions (required for core) ---
fitness_functions:
  - id: "FF-CUSTOM-001"
    name: "Custom spec folder path resolution"
    type: "unit-test"
    path: "tests/test_config.py"
    dimension: "correctness"
  - id: "FF-CUSTOM-002"
    name: "Skills injected into agent files"
    type: "integration-test"
    path: "tests/test_agents.py"
    dimension: "correctness"

# --- ADRs ---
adrs: []
  # - "docs/adr/0001-use-event-sourcing.md"

# --- Traceability (can be auto-generated by `evospec reverse`) ---
traceability:
  endpoints: []
  tables: []
  modules:
    - "evospec.core.config"
    - "evospec.core.init"
    - "evospec.core.agents"
    - "evospec.cli.main"
  events: []
  migrations: []

