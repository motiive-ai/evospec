  #   dimension: "data-integrity"

# --- ADRs ---
adrs: []
  # - "docs/adr/0001-use-event-sourcing.md"

# --- Traceability (can be auto-generated by `evospec reverse`) ---
traceability:
  endpoints: []
  tables: []
  modules:
    - "evospec.cli.main"
    - "evospec.core.sync"
    - "evospec.core.verify"
    - "evospec.core.capture"
    - "evospec.core.config"
    - "evospec.mcp.server"
  events: []
  migrations: []

