# --- Design Thinking (edge/hybrid) ---
design_thinking:
  current_phase: "define"
  problem_statement: "Teams adopting EvoSpec on existing codebases face two problems: (1) no way to generate a spec baseline from years of code history, and (2) specs silently drift from implementation when teams commit without updating specs. AI agents trusting stale MCP context get wrong information."
  ideas_explored: 5
  empathy_artifacts: []
  prototypes: []
    # - id: "PROTO-001"
    #   type: "figma"           # figma | code-spike | paper | wizard-of-oz
    #   url: ""
    #   experiment_id: "EXP-001"  # Links to experiment that tested this prototype
    #   feedback_summary: ""

