# EvoSpec Change Specification
# Schema: https://evospec.dev/schemas/spec.schema.json

id: "auto-spec-sync-and-verification"
title: "Auto-Spec Sync & Verification (evospec sync, verify, capture --from-history)"
zone: "hybrid"  # edge | hybrid | core
change_type: "improvement"  # experiment | improvement | bugfix
status: "draft"     # draft | proposed | accepted | in-progress | completed | abandoned | superseded
created_at: "2026-03-02"
updated_at: "2026-03-02"

# --- Classification (output of `evospec classify`) ---
classification:
  touches_persistence: false
  touches_auth: false
  touches_billing: false
  touches_audit: false
  touches_multi_tenancy: false
  crosses_context_boundary: true
  is_hypothesis: false
  reversibility: "trivial"  # trivial | moderate | difficult | irreversible
  risk_level: "medium"          # low | medium | high | critical
  rationale: "Three new CLI commands (sync, verify, capture --from-history) that analyze git diffs, verify spec accuracy against implementation, and retroactively generate specs from history. Crosses spec-engine → reverse-engineering → domain-management. Additive — no changes to existing commands."

# --- Invariant Impact (auto-populated by `evospec classify` or MCP check_invariant_impact) ---
# Shows which existing core invariants this change may affect.
invariant_impact:
  conflicts: []
    # - invariant_id: "INV-001"
    #   spec_path: "specs/changes/2025-06-01-order-rules/"
    #   statement: "Every Order must have at least one LineItem"
    #   impact: "breaks"       # breaks | relaxes | tightens | neutral
    #   resolution: ""         # exempt | evolve | shadow | redesign
    #   notes: ""
  entities_touched:
    - "SpecYaml"
    - "Entity"
    - "Invariant"
    - "FeatureCluster"
    - "DriftReport"
    - "VerificationReport"
  contexts_touched:
    - "spec-engine"
    - "reverse-engineering"
    - "domain-management"
  reviewed: true

# --- Domain (required for core, optional for hybrid) ---
bounded_context: "spec-engine"

# --- Team Topology ---
ownership:
  team: "evospec-core"
  team_type: "platform"
  interaction_mode: "x-as-a-service"

# --- Strategic Fit (Roger Martin) ---
strategic_fit:
  winning_aspiration: "Be the standard spec-driven delivery toolkit for AI-assisted development"
  where_to_play: "Teams with existing codebases and no specs (adoption blocker), and teams whose specs drift from implementation over time"
  how_to_win: "Automated drift detection, retroactive spec generation from git history, and verification scoring — specs stay trustworthy without manual discipline"
  capability_strengthened: "Spec trustworthiness and adoption friction — biggest barriers to EvoSpec adoption"

# --- Invariants (required for core) ---
invariants: []
  # - id: "INV-001"
  #   statement: "Every Order must have at least one LineItem"
  #   enforcement: "test"
  #   fitness_function: "tests/invariants/test_order_integrity.py"

