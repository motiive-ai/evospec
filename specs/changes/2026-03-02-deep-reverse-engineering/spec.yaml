# EvoSpec Change Specification
# Schema: https://evospec.dev/schemas/spec.schema.json

id: "deep-reverse-engineering"
title: "Deep Reverse Engineering (schema extraction, invariant detection, state machines)"
zone: "core"  # edge | hybrid | core
change_type: "improvement"  # experiment | improvement | bugfix
status: "draft"     # draft | proposed | accepted | in-progress | completed | abandoned | superseded
created_at: "2026-03-02"
updated_at: "2026-03-02"

# --- Classification (output of `evospec classify`) ---
classification:
  touches_persistence: false
  touches_auth: false
  touches_billing: false
  touches_audit: false
  touches_multi_tenancy: false
  crosses_context_boundary: true
  is_hypothesis: false
  reversibility: "trivial"  # trivial | moderate | difficult | irreversible
  risk_level: "medium"          # low | medium | high | critical
  rationale: "Adds --deep flag to all reverse commands. Extracts request/response schemas, suggests invariants with confidence levels, detects state machines, and maps external dependencies. Crosses reverse-engineering → domain-management boundary. Additive — existing shallow reverse remains the default."

# --- Invariant Impact (auto-populated by `evospec classify` or MCP check_invariant_impact) ---
# Shows which existing core invariants this change may affect.
invariant_impact:
  conflicts: []
    # - invariant_id: "INV-001"
    #   spec_path: "specs/changes/2025-06-01-order-rules/"
    #   statement: "Every Order must have at least one LineItem"
    #   impact: "breaks"       # breaks | relaxes | tightens | neutral
    #   resolution: ""         # exempt | evolve | shadow | redesign
    #   notes: ""
  entities_touched:
    - "APIEndpoint"
    - "Invariant"
    - "DomainEntity"
    - "StateMachine"
    - "ExternalDependency"
  contexts_touched:
    - "reverse-engineering"
    - "domain-management"
    - "spec-engine"
  reviewed: true

# --- Domain (required for core, optional for hybrid) ---
bounded_context: "reverse-engineering"

# --- Team Topology ---
ownership:
  team: "evospec-core"
  team_type: "platform"
  interaction_mode: "x-as-a-service"

# --- Strategic Fit (Roger Martin) ---
strategic_fit:
  winning_aspiration: "Be the standard spec-driven delivery toolkit for AI-assisted development"
  where_to_play: "Teams adopting EvoSpec on existing codebases that need rich domain extraction beyond structural skeletons"
  how_to_win: "Deep semantic analysis of source code — DTO field walking, validation annotation → invariant suggestion, enum → state machine detection, external dependency mapping"
  capability_strengthened: "Reverse engineering depth — currently shallow (just endpoint paths and table names)"

# --- Invariants (required for core) ---
invariants:
  - id: "DEEP-REV-001"
    statement: "Deep reverse MUST NOT overwrite existing manually-curated spec data without --force flag"
    enforcement: "api-validation"
  - id: "DEEP-REV-002"
    statement: "Suggested invariants MUST have a confidence level (high/medium/low) and source code reference"
    enforcement: "schema-validation"
  - id: "DEEP-REV-003"
    statement: "Existing shallow reverse (without --deep) MUST continue to work unchanged"
    enforcement: "test"

# --- Fitness Functions (required for core) ---
fitness_functions:
  - id: "FF-DEEP-001"
    name: "Deep reverse schema extraction per framework"
    type: "integration-test"
    path: "tests/test_deep_reverse.py"
    dimension: "correctness"
  - id: "FF-DEEP-002"
    name: "Shallow reverse backwards compatibility"
    type: "integration-test"
    path: "tests/test_reverse.py"
    dimension: "backwards-compatibility"

# --- ADRs ---
adrs: []
  # - "docs/adr/0001-use-event-sourcing.md"

# --- Traceability (can be auto-generated by `evospec reverse`) ---
traceability:
  endpoints: []
  tables: []
  modules:
    - "evospec.reverse.api"
    - "evospec.reverse.db"
    - "evospec.reverse.deps"
    - "evospec.reverse.cli"
    - "evospec.core.config"
  events: []
  migrations: []

# --- Discovery (required for edge) ---
discovery:
  outcome: ""                 # Product outcome metric this change aims to influence
  opportunity: ""             # "How Might We" framing of the customer opportunity
  iteration: 1                # Current discovery iteration (increments on pivot)
  cadence: "weekly"           # weekly | biweekly | sprint
  next_checkpoint: ""         # Date of next learning checkpoint

  # Assumptions — the riskiest things that must be true for this to work
  assumptions: []
