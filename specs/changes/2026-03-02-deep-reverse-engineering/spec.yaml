    #   statement: "Users prefer personalized recommendations over generic ones"
    #   category: "desirability"  # desirability | feasibility | viability | usability
    #   risk: "high"              # high | medium | low
    #   status: "untested"        # untested | testing | validated | invalidated | pivoted
    #   test_method: "A/B test with 200 users"
    #   success_criteria: "≥ 15% conversion rate improvement"
    #   result: ""
    #   result_date: ""
    #   learning: ""
    #   pivot_to: ""              # If invalidated, what's the new direction?

  # Experiments — concrete tests run against assumptions
  experiments: []
    # - id: "EXP-001"
    #   assumption_id: "A-001"    # Links to assumption being tested
    #   type: "prototype"         # prototype | interview | survey | A-B-test | wizard-of-oz | analytics | spike
    #   description: "Show 100 users personalized recommendations vs. generic list"
    #   started_at: ""
    #   completed_at: ""
    #   sample_size: 0
    #   result: ""                # Qualitative or quantitative result
    #   confidence: ""            # high | medium | low
    #   decision: ""              # continue | pivot | kill | promote-to-core
    #   next_experiment: ""       # ID of follow-up experiment if any

  kill_criteria: ""             # Specific, measurable criteria for when to abandon
  kill_deadline: ""             # Hard deadline for kill decision

  # Learning log — updated each iteration
  learnings: []
    # - date: "2026-03-01"
    #   iteration: 1
    #   experiment_id: "EXP-001"
    #   learning: "Users engaged with recommendations but wanted to filter by category"
    #   impact: "Pivoted from static list to filterable recommendations"
    #   spec_changed: true

# --- Design Thinking (edge/hybrid) ---
design_thinking:
  current_phase: ""          # empathize | define | ideate | prototype | test
  problem_statement: ""
  ideas_explored: 0
  empathy_artifacts: []
  prototypes: []
