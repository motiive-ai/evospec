# Domain Entity Registry — EvoSpec
# These are the core domain entities that EvoSpec manages.
# Persisted as YAML/Markdown files on disk (no database).

- name: "ChangeSpec"
  context: "spec-engine"
  aggregate_root: true
  description: "A unit of work tracked by EvoSpec. Lives in specs/changes/YYYY-MM-DD-slug/. Contains spec.yaml (metadata) plus markdown artifacts (discovery-spec, domain-contract, tasks, implementation-spec, bugfix-report, improvement-scope)."
  fields:
    - name: "id"
      type: "String"
      constraints: "slug format, unique"
    - name: "title"
      type: "String"
    - name: "zone"
      type: "String"
      constraints: "edge | hybrid | core"
    - name: "change_type"
      type: "String"
      constraints: "experiment | improvement | bugfix"
    - name: "status"
      type: "String"
      constraints: "draft | proposed | accepted | in-progress | completed | abandoned | superseded"
    - name: "classification"
      type: "Object"
      constraints: "touches_persistence, touches_auth, reversibility, risk_level, etc."
    - name: "invariant_impact"
      type: "Object"
      constraints: "conflicts[], entities_touched[], contexts_touched[]"
    - name: "invariants"
      type: "Array<Invariant>"
    - name: "fitness_functions"
      type: "Array<FitnessFunction>"
    - name: "traceability"
      type: "Object"
      constraints: "endpoints[], tables[], modules[], events[]"
  relationships:
    - target: "Invariant"
      type: "one-to-many"
    - target: "FitnessFunction"
      type: "one-to-many"
    - target: "Assumption"
      type: "one-to-many"
    - target: "Experiment"
      type: "one-to-many"
    - target: "Feature"
      type: "many-to-one"
    - target: "ADR"
      type: "many-to-many"
  invariants:
    - "INV-001"
    - "INV-002"
    - "INV-003"
    - "INV-004"
    - "INV-007"

- name: "Invariant"
  context: "spec-engine"
  aggregate_root: false
  description: "A testable proposition that must ALWAYS hold true within a bounded context. Defined in spec.yaml and enforced by fitness functions. Core to evolutionary architecture guardrails."
  fields:
    - name: "id"
      type: "String"
      constraints: "format: INV-NNN or PREFIX-INV-NNN"
    - name: "statement"
      type: "String"
    - name: "enforcement"
      type: "String"
      constraints: "test | ci-check | schema | policy | api-validation | domain-logic | state-machine | database-constraint | scheduled-job | event-handler"
    - name: "fitness_function"
      type: "String"
      constraints: "path to test file"
  relationships:
    - target: "ChangeSpec"
      type: "many-to-one"
    - target: "FitnessFunction"
      type: "one-to-one"
  invariants:
    - "INV-005"

- name: "FitnessFunction"
  context: "spec-engine"
  aggregate_root: false
  description: "An executable guardrail — a test that verifies an invariant holds. Runs via pytest/jest/go test. Can be gated in CI."
  fields:
    - name: "id"
      type: "String"
      constraints: "format: FF-NNN"
    - name: "name"
      type: "String"
    - name: "type"
      type: "String"
      constraints: "unit-test | integration-test | contract-test | schema-check | lint-rule | ci-gate"
    - name: "path"
      type: "String"
      constraints: "relative file path"
    - name: "dimension"
      type: "String"
      constraints: "security | data-integrity | performance | operability"
  relationships:
    - target: "Invariant"
      type: "one-to-one"

- name: "Assumption"
  context: "spec-engine"
  aggregate_root: false
  description: "A riskiest-first assumption in the discovery layer. Tracked through a lifecycle: untested → testing → validated/invalidated. Part of the Continuous Discovery loop (Teresa Torres)."
  fields:
    - name: "id"
      type: "String"
      constraints: "format: A-NNN"
    - name: "statement"
      type: "String"
    - name: "category"
      type: "String"
      constraints: "desirability | feasibility | viability | usability"
    - name: "risk"
      type: "String"
      constraints: "high | medium | low"
    - name: "status"
      type: "String"
      constraints: "untested | testing | validated | invalidated | pivoted"
    - name: "test_method"
      type: "String"
    - name: "result"
      type: "String"
  relationships:
    - target: "Experiment"
      type: "one-to-many"
    - target: "ChangeSpec"
      type: "many-to-one"

- name: "Experiment"
  context: "spec-engine"
  aggregate_root: false
  description: "A concrete test run against an assumption. Records what was tested, sample size, result, confidence, and decision (continue/pivot/kill/promote-to-core)."
  fields:
    - name: "id"
      type: "String"
      constraints: "format: EXP-NNN"
    - name: "assumption_id"
      type: "String"
    - name: "type"
      type: "String"
      constraints: "prototype | interview | survey | A-B-test | wizard-of-oz | analytics | spike"
    - name: "result"
      type: "String"
    - name: "confidence"
      type: "String"
      constraints: "high | medium | low"
    - name: "decision"
      type: "String"
      constraints: "continue | pivot | kill | promote-to-core"
  relationships:
    - target: "Assumption"
      type: "many-to-one"

- name: "Feature"
  context: "domain-management"
  aggregate_root: true
  description: "A product capability tracked across its lifecycle. Lives in specs/domain/features.yaml. Not every change is a feature — a bugfix or refactor doesn't need one."
  fields:
    - name: "id"
      type: "String"
      constraints: "format: feat-NNN"
    - name: "title"
      type: "String"
    - name: "zone"
      type: "String"
      constraints: "edge | hybrid | core"
    - name: "status"
      type: "String"
      constraints: "discovery | specifying | implementing | validating | shipped | killed"
    - name: "knowledge_stage"
      type: "String"
      constraints: "mystery | heuristic | algorithm"
    - name: "spec_path"
      type: "String"
    - name: "owner"
      type: "String"
  relationships:
    - target: "ChangeSpec"
      type: "one-to-many"

- name: "DomainEntity"
  context: "domain-management"
  aggregate_root: false
  description: "An entry in the entity registry (specs/domain/entities.yaml). Describes a business concept with fields, relationships, and invariant references. Populated via evospec reverse db or manually."
  fields:
    - name: "name"
      type: "String"
    - name: "context"
      type: "String"
    - name: "table"
      type: "String"
    - name: "aggregate_root"
      type: "Boolean"
    - name: "fields"
      type: "Array<Field>"
    - name: "relationships"
      type: "Array<Relationship>"
    - name: "invariants"
      type: "Array<String>"
      constraints: "invariant IDs"
  relationships:
    - target: "BoundedContext"
      type: "many-to-one"

- name: "BoundedContext"
  context: "domain-management"
  aggregate_root: false
  description: "A DDD bounded context registered in specs/domain/contexts.yaml. Defines ownership, type (core/supporting/generic), and description."
  fields:
    - name: "name"
      type: "String"
    - name: "owner"
      type: "String"
    - name: "type"
      type: "String"
      constraints: "core | supporting | generic"
    - name: "description"
      type: "String"
  relationships:
    - target: "DomainEntity"
      type: "one-to-many"

- name: "ADR"
  context: "spec-engine"
  aggregate_root: true
  description: "Architecture Decision Record. Documents why a decision was made, what alternatives were considered, and what it costs. Lives in docs/adr/NNNN-title.md."
  fields:
    - name: "number"
      type: "Integer"
      constraints: "auto-incremented, zero-padded 4 digits"
    - name: "title"
      type: "String"
    - name: "status"
      type: "String"
      constraints: "Proposed | Accepted | Deprecated | Superseded"
    - name: "date"
      type: "Date"
  relationships:
    - target: "ChangeSpec"
      type: "many-to-many"

- name: "CanonicalWorkflow"
  context: "agent-integration"
  aggregate_root: true
  description: "A platform-agnostic workflow definition in YAML. Lives in src/evospec/templates/workflows/*.yaml. The generator reads these and emits platform-specific files for Windsurf, Claude, and Cursor."
  fields:
    - name: "id"
      type: "String"
      constraints: "discover | improve | fix | contract | tasks | implement | capture | learn | check | adr"
    - name: "name"
      type: "String"
    - name: "slash_command"
      type: "String"
      constraints: "format: evospec.<id>"
    - name: "steps"
      type: "Array<Step>"
    - name: "handoffs"
      type: "Array<Handoff>"
    - name: "rules"
      type: "Array<String>"
  relationships: []

- name: "ProjectConfig"
  context: "spec-engine"
  aggregate_root: true
  description: "The evospec.yaml file at the project root. Contains project metadata, paths, classification triggers, teams, upstreams, fitness functions config, reverse engineering config, and strategy. Domain data is NOT here — it lives in specs/domain/*.yaml."
  fields:
    - name: "project"
      type: "Object"
      constraints: "name, description, version"
    - name: "paths"
      type: "Object"
      constraints: "specs, templates, adrs, domain, checks"
    - name: "classification"
      type: "Object"
      constraints: "core_triggers[], default_reversibility"
    - name: "teams"
      type: "Array<Team>"
    - name: "upstreams"
      type: "Array<Upstream>"
      constraints: "name + path to sibling repo"
    - name: "fitness_functions"
      type: "Object"
      constraints: "run_command, test_runner, ci_gate"
    - name: "strategy"
      type: "Object"
      constraints: "winning_aspiration, where_to_play, how_to_win"
  relationships:
    - target: "ChangeSpec"
      type: "one-to-many"
    - target: "Feature"
      type: "one-to-many"
    - target: "DomainEntity"
      type: "one-to-many"
    - target: "BoundedContext"
      type: "one-to-many"
  invariants:
    - "INV-008"
